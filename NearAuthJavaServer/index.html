<body>
    <div id="banner">
        <!-- <a href="/billing"><span id="companyLink">Billing</span></a>
        <a href="/users"><span id="users">Users</span></a> -->
    </div>
    <div id="signinBody">
        <div id="centerPanelCo">
            <div class='incorrect'></div>
            <img id="licenseLogo" src="/imgFiles/Icon-App-76x76@3x.png" alt="NearAuth.ai logo">
            <div id="centerPanelSignup">
                <form id='coForm' action="/company" method="post">
                    <span id='signinLabels'>
                        <span id='usernameLabel' class='signinItem'>
                            Username:
                        </span>
                        <span id='pwLabel' class='signinItem'>
                            Password:
                        </span>
                    </span>
                    <span id='signinText'>
                        <span id='usernameText' class='signinItem'>
                            <input type='text' name='username' id='username' autocomplete='username'>
                        </span>
                        <span id='pwText' class='signinItem'>
                            <input type='password' name='pw' id='pw' autocomplete='current-password'>
                        </span>
                    </span>
                    <div class='signinRow'><button type='submit' class='companyTableButton'>Submit</button></div>
                    <input type='hidden' id='b2fIgnorePageFlag' value='true'/>
                </form>
                
            </div>
        </div>
    </div>
    <!-- <input type='hidden' id='b2fIgnorePageFlag' value='true'></input> -->
	<div id='mobileMenuText'>
    <div id='mobileMenuUser' class='companyMobileMenu'><a href='/' class="noUnderline black">Users</a></div>
    <div id='mobileMenuSettings' class='companyMobileMenu'><a href='/settings' class="noUnderline black">Settings</a></div>
    <div id='mobileMenuServers' class='companyMobileMenu'><a href='/servers' class="noUnderline black">Servers</a></div>
    <div id='mobileMenuServers' class='companyMobileMenu'><a href="/serviceProviders">Service Providers</a></div>
    
    
    <div id='mobileMenuDocumentation' class='companyMobileMenu'><a href="/documentation" class="noUnderline black">Documentation</a></div>
    <div id='mobileMenuSignOut' class='companyMobileMenu'>Sign Out</div>
</div>

	<div id='popup' class='popup'>
    <div id='popupIcon'></div>
    <div id='popupX'>x</div>
    <div id='popupTitle'>Title</div>
    <div id='popupMessage'>Message</div>
    <form method='POST' id='companyForm' action='/company'>
        <div id='popupTextAreaDivLabel'></div>
        <div id='popupTextAreaDiv'>
           <textarea id='popupTextArea' name='popupTextArea'></textarea>
        </div>
        <div id='popupTextAreaDiv2Label'></div>
        <div id='popupTextAreaDiv2'>
           <textarea id='popupTextArea2' name='popupTextArea2'></textarea>
        </div>
        <div class='popupInputRow' id='popupInputRow1'>
            <span id='popupInputLabel1'></span><input type='text' class='popupInput' id='popupInput1' name='popupInput1'/>
        </div>
        <div class='popupInputRow' id='popupInputRow2'>
            <span id='popupInputLabel2'></span><input type='text' class='popupInput' id='popupInput2' name='popupInput2'/>
        </div>
        <div class='popupInputRow' id='popupInputRow3'>
            <span id='popupInputLabel3'></span><input type='text' class='popupInput' id='popupInput3' name='popupInput3'/>
        </div>
        <div class='popupInputRow' id='selectUserRow'>
            <label for='role'>Select a role</label>
            <select name='role' id='role'>
                <option value="SUPER_ADMIN" id="superAdminPopup">Super Admin</option>
                <option value="ADMIN" id="adminPopup">Admin</option>
                <option value="AUDITOR" id="auditorPopup">Auditor</option>
                <option value="USER" id="userPopup">User</option>
            </select>
        </div>
        <div id='popupButtons'>
            <button class='popupButton' id='popupCancel' >Cancel</button>
            <button class='popupButton' id='popupOk' >OK</button>
        </div>
        <input id='popupHidden1' name='popupHidden1' type='hidden'>
        <input id='popupHidden2' name='popupHidden2' type='hidden'>
    </form>
</div>
<div id='cover'></div>
